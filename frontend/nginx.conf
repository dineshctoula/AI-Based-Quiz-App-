# Nginx server configuration (React frontend को लागि Nginx कन्फिगरेसन)
server {
    listen 80;
    server_name localhost;

    # Root directory where the React build is located
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression configuration (वेबसाइट छिटो लोड गराउन compression setup)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Route all requests to index.html to support React Router SPA (React router fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache control (image, css, js cache control)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error pages configuration
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
