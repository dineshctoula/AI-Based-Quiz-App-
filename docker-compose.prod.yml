version: '3.8'

# Production environment orchestration (उत्पादन वातावरणको लागि docker-compose व्यवस्थापन)
services:
  # 1. PostgreSQL Database Service
  postgres_prod:
    image: postgres:15-alpine
    container_name: quiz_postgres_prod
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password_123
      POSTGRES_DB: quiz_db_prod
    ports:
      - '5432:5432'
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_db_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. NestJS Backend Application Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz_backend_prod
    ports:
      - '5000:5000'
    environment:
      # Use internal docker dns 'postgres_prod' to connect to DB
      DATABASE_URL: postgresql://quiz_user:quiz_password_123@postgres_prod:5432/quiz_db_prod?schema=public
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: production_secure_jwt_secret_token_123_456
      # Pass GEMINI_API_KEY from host env or specify here if needed
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FRONTEND_URL: http://localhost
    depends_on:
      postgres_prod:
        condition: service_healthy
    restart: unless-stopped

  # 3. Nginx Static HTML / React Application Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiz_frontend_prod
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_prod_data:
    driver: local
